name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vortara_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Test with race detector
        run: make test-race

      - name: Vet
        run: make vet

      - name: Integration tests
        run: make test-integration

      - name: End-to-end tests
        run: make test-e2e
        env:
          POSTGRES_URL: postgres://postgres:postgres@localhost:5432/vortara_test?sslmode=disable
