version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vortara
      POSTGRES_PASSWORD: vortara
      POSTGRES_DB: demo
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vortara -d demo"]
      interval: 2s
      timeout: 5s
      retries: 10
