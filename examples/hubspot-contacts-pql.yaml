sync:
  name: pql-to-hubspot

  source:
    type: postgres
    url: "${DATABASE_URL}"
    query: |
      SELECT
        id,
        email,
        first_name,
        last_name,
        company,
        job_title,
        arr,
        status,
        updated_at
      FROM contacts
      WHERE email IS NOT NULL
    entity_key: id

  required:
    - email

  mapping:
    - source: email
    - source: first_name
      dest: firstname
    - source: last_name
      dest: lastname
    - source: company
    - source: job_title
      dest: jobtitle
    - source: arr
      dest: annualrevenue

  state:
    backend: sqlite
    path: ./state/pql-to-hubspot.db

  decisions:
    default: skip
    rules:
      - name: new-contact
        when: first_seen()
        action: create

      - name: meaningful-change
        when:
          fingerprint_changed: {}
        action: update

  destination:
    type: hubspot
    object: contact
    match_on: [email]
    auth:
      type: bearer
      token: "${HUBSPOT_PRIVATE_APP_TOKEN}"

  safety:
    max_creates_per_run: 25
    max_updates_per_run: 100

  errors:
    on_error: skip
    dlq:
      path: ./dlq/pql-to-hubspot.dlq.jsonl
      on_status: [400, 401, 403, 409, 422, 429, 500, 502, 503]

  # Run with: vortara test examples/hubspot-contacts-pql.yaml
  tests:
    - name: first_seen_creates
      previous: null
      current:
        email: alice@acme.com
        firstname: Alice
        lastname: Smith
        company: Acme Corp
        jobtitle: VP Engineering
        annualrevenue: "120000"
        vortara_status: active
      expect:
        decision: create
        triggered_rules:
          - new-contact

    - name: arr_change_updates
      previous:
        email: alice@acme.com
        firstname: Alice
        lastname: Smith
        company: Acme Corp
        annualrevenue: "120000"
        vortara_status: active
      current:
        email: alice@acme.com
        firstname: Alice
        lastname: Smith
        company: Acme Corp
        annualrevenue: "150000"
        vortara_status: active
      expect:
        decision: update
        triggered_rules:
          - meaningful-change
        changed_fields:
          - annualrevenue

    - name: timestamp_only_skips
      previous:
        email: alice@acme.com
        annualrevenue: "120000"
        vortara_status: active
        vortara_updated_at: "2026-07-01T10:00:00Z"
      current:
        email: alice@acme.com
        annualrevenue: "120000"
        vortara_status: active
        vortara_updated_at: "2026-07-02T10:00:00Z"
      expect:
        decision: skip
