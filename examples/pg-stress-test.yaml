name: pg-stress-test
source:
  type: postgres
  url: postgres://vulcan:vulcan@localhost:5433/warehouse?sslmode=disable
  table: events
  watermark: updated_at
  batch_size: 5000
  parallelism: 4

destinations:
  - type: postgres
    url: postgres://vulcan:vulcan@localhost:5431/statestore?sslmode=disable
    table: events_sink
    match_on: [id]
    strategy: merge

settings:
  state:
    backend: sqlite
    path: /tmp/vortara-stress-state.db
  concurrency:
    workers: 8
    batch_size: 5000
