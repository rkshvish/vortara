name: pg-to-rest-k8s-test
source:
  type: postgres
  url: postgres://tester:tester@localhost:15432/testdb?sslmode=disable
  table: contacts
  watermark: updated_at
  batch_size: 100

transform:
  - filter: "status == 'active'"

destinations:
  - type: restapi
    url: http://localhost:18080/contacts
    method: POST
    strategy: append

settings:
  state:
    backend: sqlite
    path: /tmp/pg-rest-test-state.db
