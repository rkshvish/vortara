sync:
  name: pql-to-webhook
  description: "Postgres PQL → REST webhook demo — fires when a lead becomes MQL or SQL"

  source:
    type: postgres
    url: "${DATABASE_URL}"
    query: |
      SELECT
        id,
        email,
        first_name,
        last_name,
        company,
        title,
        lead_score,
        lifecycle_stage,
        last_activity_at,
        created_at
      FROM leads
      WHERE lead_score IS NOT NULL
    entity_key: id
    watermark:
      column: last_activity_at

  required:
    - email
    - lead_score

  mapping:
    - source: id
    - source: email
    - source: first_name
      dest: firstName
    - source: last_name
      dest: lastName
    - source: company
    - source: title
    - source: lead_score
      dest: leadScore
    - source: lifecycle_stage
      dest: lifecycleStage
    - source: last_activity_at
      dest: lastActivityAt
      exclude_from_fingerprint: true
    - source: created_at
      dest: createdAt
      exclude_from_fingerprint: true

  state:
    backend: sqlite
    path: ./state/pql-to-webhook.db
    fingerprint:
      exclude:
        - lastActivityAt
        - createdAt

  decisions:
    default: skip
    rules:
      - name: new-mql
        when: first_seen()
        action: create

      - name: became-sql
        when:
          transitioned:
            field: lifecycleStage
            from: mql
            to: sql
        action: update
        remember:
          became_sql_at: now()

      - name: high-score-jump
        when:
          fingerprint_changed: {}
        action: update

  on_missing_from_source:
    action: skip
    after_missing_runs: 5

  destination:
    type: restapi
    url: "${WEBHOOK_URL}"
    auth:
      type: bearer
      token: "${WEBHOOK_TOKEN}"
    method: POST

  safety:
    max_creates_per_run: 500
    max_updates_per_run: 1000

  errors:
    on_error: skip
    dlq:
      path: ./dlq/pql-to-webhook.dlq.jsonl
      on_status: [429, 500, 502, 503]
    retry:
      on_status: [429, 500, 502, 503]
      attempts: 3
      backoff: exponential
      initial_delay: 1s
      max_delay: 30s

  # Run with: vortara test examples/rest-webhook-pql.yaml
  tests:
    - name: first_seen_creates
      previous: null
      current:
        id: lead_001
        email: alice@example.com
        firstName: Alice
        lastName: Smith
        company: Acme Corp
        leadScore: 82
        lifecycleStage: mql
        lastActivityAt: "2026-07-01T10:00:00Z"
        createdAt: "2026-06-01T00:00:00Z"
      expect:
        decision: create
        triggered_rules:
          - new-mql

    - name: score_change_updates
      previous:
        id: lead_001
        email: alice@example.com
        firstName: Alice
        lastName: Smith
        company: Acme Corp
        leadScore: 82
        lifecycleStage: mql
        lastActivityAt: "2026-07-01T10:00:00Z"
        createdAt: "2026-06-01T00:00:00Z"
      current:
        id: lead_001
        email: alice@example.com
        firstName: Alice
        lastName: Smith
        company: Acme Corp
        leadScore: 91
        lifecycleStage: mql
        lastActivityAt: "2026-07-02T10:00:00Z"
        createdAt: "2026-06-01T00:00:00Z"
      expect:
        decision: update
        triggered_rules:
          - high-score-jump
        changed_fields:
          - leadScore

    - name: timestamp_only_change_skips
      previous:
        id: lead_001
        email: alice@example.com
        firstName: Alice
        lastName: Smith
        company: Acme Corp
        leadScore: 91
        lifecycleStage: mql
        lastActivityAt: "2026-07-01T10:00:00Z"
        createdAt: "2026-06-01T00:00:00Z"
      current:
        id: lead_001
        email: alice@example.com
        firstName: Alice
        lastName: Smith
        company: Acme Corp
        leadScore: 91
        lifecycleStage: mql
        lastActivityAt: "2026-07-02T10:00:00Z"
        createdAt: "2026-06-01T00:00:00Z"
      expect:
        decision: skip

    - name: lifecycle_transition_to_sql
      previous:
        id: lead_001
        email: alice@example.com
        firstName: Alice
        lastName: Smith
        company: Acme Corp
        leadScore: 91
        lifecycleStage: mql
        lastActivityAt: "2026-07-01T10:00:00Z"
        createdAt: "2026-06-01T00:00:00Z"
      current:
        id: lead_001
        email: alice@example.com
        firstName: Alice
        lastName: Smith
        company: Acme Corp
        leadScore: 91
        lifecycleStage: sql
        lastActivityAt: "2026-07-03T10:00:00Z"
        createdAt: "2026-06-01T00:00:00Z"
      expect:
        decision: update
        triggered_rules:
          - became-sql
        changed_fields:
          - lifecycleStage
