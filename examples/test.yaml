name: pg-to-webhook
source:
  type: postgres
  url: postgres://vulcan:vulcan@localhost:5433/warehouse?sslmode=disable
  table: customers
  watermark: updated_at
  batch_size: 100

destinations:
  - type: restapi
    url: https://webhooksite.net/41e1aa40-84ac-4535-91cd-2743dce7bc81
    method: POST
    headers:
      Content-Type: application/json

settings:
  state:
    backend: sqlite
    path: /tmp/vortara-pg-webhook.db