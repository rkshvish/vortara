services:
  postgres:
    image: postgres:16
    container_name: vortara-example-postgres
    environment:
      POSTGRES_USER: vortara
      POSTGRES_PASSWORD: vortara
      POSTGRES_DB: warehouse
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vortara -d warehouse"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  webhook:
    build:
      context: ./webhook
    container_name: vortara-example-webhook
    ports:
      - "18081:8080"
